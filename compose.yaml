services:
  bitcoin_server:
    image: bitcoin/bitcoin:latest
    volumes:
      - type: bind
        source: ./bitcoin.conf
        target: /bitcoin.conf
      - bitcoin_data:/home/bitcoin/.bitcoin
    command:
      -conf=/bitcoin.conf
    

  client:
    image: testbtc:latest
    build:
      context: .
    stdin_open: true
    tty: true
    depends_on:
      - bitcoin_server
    environment:
      - BITCOIN_RPC_USER=test
      - BITCOIN_RPC_PASSWORD=test123
      - BITCOIN_RPC_HOST=bitcoin_server

volumes:
  bitcoin_data: 
